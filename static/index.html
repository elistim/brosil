<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Бросил</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
  <h1>Бросил</h1>
  <div class="subtitle">Календарь дней без сигарет, алкоголя и дневника</div>

  <div class="cards">
    <div class="card">
      <div class="number" id="smokeCount">0</div>
      <div>дней не курил</div>
    </div>
  
    <div class="card">
      <div class="number" id="drinkCount">0</div>
      <div>дней не пил</div>
    </div>
  
    <div class="card">
      <div class="number" id="diaryCount">0</div>
      <div>дней вел дневник</div>
    </div>
  </div>

  <div class="buttons">
    <button onclick="saveToday('smoke')">Не курил</button>
    <button onclick="saveToday('drink')">Не пил</button>
    <button onclick="saveToday('diary')">Дневник</button>
    <button onclick="saveBoth()">Не курил и не пил</button>
    <button class="reset" onclick="resetToday()">Сбросить день</button>
  </div>

  <div class="calendar">
    <div class="month">
      <button onclick="changeMonth(-1)">←</button>
      <span id="monthTitle"></span>
      <button onclick="changeMonth(1)">→</button>
    </div>
    <div class="grid" id="calendar"></div>
  </div>
</div>

<script src="/script.js"></script>
</body>
</html>
