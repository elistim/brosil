<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бросил</title>
  <link rel="stylesheet" href="/style.css?v=23">
</head>
<body>
<div class="container">
  <h1>Бросил</h1>
  <div class="subtitle">Календарь дней без сигарет, алкоголя, дневника и финансов</div>

  <div class="cards">
    <div class="card">
      <div class="number" id="smokeCount">0</div>
      <div>дней не курил</div>
      <div class="record">рекорд: <span id="smokeRecord">0</span></div>
    </div>
  
    <div class="card">
      <div class="number" id="drinkCount">0</div>
      <div>дней не пил</div>
      <div class="record">рекорд: <span id="drinkRecord">0</span></div>
    </div>
  
    <div class="card">
      <div class="number" id="diaryCount">0</div>
      <div>дней вел дневник</div>
      <div class="record">рекорд: <span id="diaryRecord">0</span></div>
    </div>

    <div class="card">
      <div class="number" id="financeCount">0</div>
      <div>дней вел финансы</div>
      <div class="record">рекорд: <span id="financeRecord">0</span></div>
    </div>
  </div>

  <div class="calendar">
    <div class="month">
      <button onclick="changeMonth(-1)">←</button>
      <span id="monthTitle"></span>
      <button onclick="changeMonth(1)">→</button>
    </div>
    <div class="grid" id="calendar"></div>
    <form id="dayEditor" class="day-editor" hidden>
      <div class="editor-title" id="editorTitle"></div>
      <label>
        <input id="editSmoke" type="checkbox">
        <span>Не курил</span>
      </label>
      <label>
        <input id="editDrink" type="checkbox">
        <span>Не пил</span>
      </label>
      <label>
        <input id="editDiary" type="checkbox">
        <span>Дневник</span>
      </label>
      <label>
        <input id="editFinance" type="checkbox">
        <span>Финансы</span>
      </label>
      <div class="editor-actions">
        <button type="submit" class="confirm">Подтвердить</button>
        <button id="editorCancel" class="secondary" type="button">Отмена</button>
        <button id="editorReset" class="reset" type="button">Сбросить</button>
      </div>
    </form>
  </div>
</div>

<div id="foxChair" class="fox-chair" aria-hidden="true">
  <div class="chair-back"></div>
  <div class="chair-arms"></div>
  <div class="chair-seat"></div>
  <div class="chair-base"></div>
</div>
<img id="fox" class="fox" src="/foxy/animation/run/foxy-run_00.png" alt="fox">
<script src="/script.js?v=23"></script>
</body>
</html>
